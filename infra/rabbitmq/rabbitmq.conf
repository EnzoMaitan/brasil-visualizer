# RabbitMQ configuration for the local geodata stack.
#
# By default the built-in `guest` user may only connect over loopback (localhost).
# Inside Docker Compose, the backend and workers connect from *other* containers,
# which RabbitMQ sees as remote — so guest would be refused with ACCESS_REFUSED.
#
# Lifting the restriction keeps the simple guest/guest credentials working across
# the Compose network. This is safe for a local-only, clone-and-run portfolio stack.
# Never disable this in a real deployment.
loopback_users.guest = false
