# ─────────────────────────────────────────────────────────────────────────────
# geodata-platform — core stack (infrastructure + app services, NO workers)
#
#   docker compose up --build                      # core stack only
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.brazil.yml up  # core + Brazil worker
#
# Service hostnames on the `geodata` network match the env-var URLs documented in
# CLAUDE.md §12: mongo, redis, rabbitmq.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - geodata

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geodata

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI (http://localhost:15672, guest/guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - geodata

  # ─── Application services ───────────────────────────────────────────────────

  # NestJS read API over the geodata MongoDB. Reads only — it does not yet consume
  # RabbitMQ (data is loaded via apps/workers/brazil/seed_mongo.py for now), so it
  # depends on mongo alone. REDIS_URL / RABBITMQ_URL are wired for when those land.
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongo:27017/geodata
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - geodata

  # frontend: enabled once apps/frontend is wired to the API. It still runs standalone on
  # bundled synthetic data today (see apps/frontend/README.md), so it stays out of Compose.
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: apps/frontend/Dockerfile
  #   restart: unless-stopped
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     # Browser-facing: must be reachable from the host, not the service name.
  #     VITE_API_URL: http://localhost:3000
  #   depends_on:
  #     - backend
  #   networks:
  #     - geodata

networks:
  geodata:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
  rabbitmq-data:
