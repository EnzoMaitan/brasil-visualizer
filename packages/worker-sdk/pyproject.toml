[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "worker-sdk"
version = "0.1.0"
description = "Base classes for geodata-platform country workers"
requires-python = ">=3.12"
dependencies = [
    "pika>=1.3",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["worker_sdk*"]
